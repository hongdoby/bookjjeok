apiVersion: v1
kind: ServiceAccount
metadata:
  name: token-refresher
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: token-refresher
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "delete", "get", "list"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: token-refresher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: token-refresher
subjects:
- kind: ServiceAccount
  name: token-refresher
  namespace: kube-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kubeadm-token-refresh
  namespace: kube-system
spec:
  schedule: "0 */20 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          hostPID: true
          hostNetwork: true
          nodeSelector:
            node-role.kubernetes.io/control-plane: ""
          tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
          serviceAccountName: token-refresher
          containers:
          - name: token-refresher
            image: amazon/aws-cli
            securityContext:
              privileged: true
            command:
            - /bin/bash
            - -c
            - |
              JOIN_CMD=$(nsenter -m/proc/1/ns/mnt -- kubeadm token create --print-join-command 2>/dev/null)
              echo "Generated join command"
              aws ssm put-parameter \
                --name "/bookjjeok/k8s/join-command" \
                --value "$JOIN_CMD" \
                --type SecureString \
                --overwrite \
                --region ap-northeast-2
              echo "Stored in SSM successfully"
            env:
            - name: AWS_DEFAULT_REGION
              value: ap-northeast-2
          restartPolicy: OnFailure
