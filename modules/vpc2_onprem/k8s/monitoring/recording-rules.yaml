apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: bookjjeok-recording-rules
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: bookjjeok.recording.infra
    interval: 30s
    rules:
    - record: job:node_cpu_usage:avg5m
      expr: 1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m]))
    - record: job:envoy_error_rate:rate5m
      expr: |
        sum(rate(envoy_http_downstream_rq_xx{envoy_response_code_class="5"}[5m]))
        / clamp_min(sum(rate(envoy_http_downstream_rq_total[5m])), 0.001)
    - record: job:envoy_latency_p95:rate5m
      expr: |
        histogram_quantile(0.95, sum(rate(envoy_http_downstream_rq_time_bucket[5m])) by (le)) or vector(0)
    - record: job:node_memory_usage:avg
      expr: 1 - avg(node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
    - record: job:bookjjeok_pod_pending:count
      expr: |
        count(kube_pod_status_phase{phase="Pending", namespace="bookjjeok"} == 1) or vector(0)
    - record: job:bookjjeok_db_pool_usage:ratio
      expr: |
        avg(hikaricp_connections_active{namespace="bookjjeok"})
        / clamp_min(
            avg(hikaricp_connections_active{namespace="bookjjeok"})
            + avg(hikaricp_connections_idle{namespace="bookjjeok"}),
            1
          )

  - name: bookjjeok.recording.health
    interval: 30s
    rules:
    - record: job:bookjjeok_health_score
      expr: |
        clamp(
          30 * clamp(1 - job:node_cpu_usage:avg5m / 0.80, 0, 1)
          + 25 * clamp(1 - job:envoy_error_rate:rate5m / 0.05, 0, 1)
          + 20 * clamp(1 - job:envoy_latency_p95:rate5m / 2000, 0, 1)
          + 15 * clamp(1 - job:node_memory_usage:avg / 0.90, 0, 1)
          + 5  * (1 - clamp(job:bookjjeok_pod_pending:count / 5, 0, 1))
          + 5  * (1 - clamp(job:bookjjeok_db_pool_usage:ratio, 0, 1)),
          0, 100
        )
    - record: job:bookjjeok_vpc2_weight
      expr: |
        100 * (job:bookjjeok_health_score >= bool 80)
        + 70 * (job:bookjjeok_health_score >= bool 60) * (job:bookjjeok_health_score < bool 80)
        + 30 * (job:bookjjeok_health_score >= bool 40) * (job:bookjjeok_health_score < bool 60)
    - record: job:bookjjeok_vpc1_weight
      expr: 100 - job:bookjjeok_vpc2_weight
