apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: bookjjeok-backend
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
    - bookjjeok
  selector:
    matchLabels:
      app: backend
  endpoints:
  - port: http
    path: /actuator/prometheus
    interval: 30s
