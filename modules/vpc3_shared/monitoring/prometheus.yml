global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'vpc1-nodes'
    static_configs:
      - targets:
        - '10.0.12.234:9100'
        - '10.0.14.175:9100'

  - job_name: 'vpc2-nodes'
    static_configs:
      - targets:
        - '10.1.16.15:9100'
        - '10.1.23.243:9100'
        - '10.1.25.44:9100'

  - job_name: 'vpc1-prometheus-federation'
    honor_labels: true
    metrics_path: '/federate'
    params:
      match[]:
        - '{job!=""}'
    static_configs:
      - targets:
        - '10.0.12.234:30090'

  - job_name: 'vpc2-prometheus-federation'
    honor_labels: true
    metrics_path: '/federate'
    params:
      match[]:
        - '{job!=""}'
    static_configs:
      - targets:
        - '10.1.25.44:30090'

  - job_name: 'vpc1-kube-state-metrics'
    static_configs:
      - targets:
        - '10.0.12.234:30080'

  - job_name: 'vpc2-kube-state-metrics'
    static_configs:
      - targets:
        - '10.1.25.44:30080'